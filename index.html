}

function renderTasks() {
    const list  = document.getElementById('task-list');
    const tasks = filtered();

    if (!tasks.length) {
        const isFiltered = state.listHiddenStatuses.size > 0 || state.search || state.listHiddenCategories.size > 0;
        list.innerHTML = `<div class="empty-state">
            <div class="es-icon">${isFiltered ? '&#x1F50D;' : '&#x1F4CB;'}</div>
            <div class="es-title">${isFiltered ? 'No matching tasks' : 'No tasks yet'}</div>
            <div class="es-sub">${isFiltered ? 'Try adjusting your filters or search.' : 'Click &ldquo;+ New Task&rdquo; to get started.'}</div>
        </div>`;
        return;
    }

    // Pin the active timer task at the top in its own section
    const activeId   = state.activeTimer?.taskId;
    const activeTask = activeId ? tasks.find(t => t.id === activeId) : null;
    const rest       = activeTask ? tasks.filter(t => t.id !== activeId) : tasks;

    let html = '';

    if (activeTask) {
        html += `<div class="active-section">
            <div class="active-section-header">
                <span class="dot"></span> Currently Clocked In
            </div>
            ${taskCardHtml(activeTask)}
        </div>`;
    }

    if (!state.groupByCategory) {
        html += rest.map(taskCardHtml).join('');
        list.innerHTML = html;
        return;
    }

    // Group by category
    const groups = new Map(); // catId → task[]
    const noCat  = [];
    rest.forEach(t => {
        if (t.category && state.categories.find(c => c.id === t.category)) {
            if (!groups.has(t.category)) groups.set(t.category, []);
            groups.get(t.category).push(t);
        } else {
            noCat.push(t);
        }
    });

    state.categories.forEach(cat => {
        const catTasks = groups.get(cat.id);
        if (!catTasks || catTasks.length === 0) return;
        const collapsed = state.collapsedGroups.has(cat.id);
        html += `<div class="task-group${collapsed ? ' collapsed' : ''}"
                      ondragover="groupDragOver(event,'${cat.id}')"
                      ondragleave="groupDragLeave(event)"
                      ondrop="groupDrop(event,'${cat.id}')">
            <div class="task-group-header"
                 draggable="true"
                 ondragstart="groupDragStart(event,'${cat.id}')"
                 ondragend="groupDragEnd(event)"
                 onclick="toggleGroupCollapse('${cat.id}')">
                <span class="group-drag-handle">&#8942;</span>
                <span class="cat-dot" style="width:10px;height:10px;background:${cat.color}"></span>
                ${esc(cat.name)}
                <span class="task-group-count">${catTasks.length}</span>
                <span class="task-group-chevron">&#9660;</span>
            </div>
            <div class="task-group-body task-list">
                ${catTasks.map(taskCardHtml).join('')}
            </div>
        </div>`;
    });
    if (noCat.length > 0) {
        const collapsed = state.collapsedGroups.has('');
        html += `<div class="task-group${collapsed ? ' collapsed' : ''}">
            <div class="task-group-header" onclick="toggleGroupCollapse('')">
                Uncategorized
                <span class="task-group-count">${noCat.length}</span>
                <span class="task-group-chevron">&#9660;</span>
            </div>
            <div class="task-group-body task-list">
                ${noCat.map(taskCardHtml).join('')}
            </div>
        </div>`;
    }
    list.innerHTML = html;
}

function updateStats() {
    const tasks = state.tasks;
    document.getElementById('stat-total').textContent  = tasks.length;
    document.getElementById('stat-active').textContent = tasks.filter(t => t.status === 'in-progress').length;
    document.getElementById('stat-done').textContent   = tasks.filter(t => t.status === 'completed').length;
    let s = tasks.reduce((a,t) => a + (t.totalSeconds || 0), 0);
    if (state.activeTimer) s += Math.floor((Date.now() - state.activeTimer.startTime) / 1000);
    document.getElementById('stat-hours').textContent = (s / 3600).toFixed(1) + 'h';
}

// ── Modals ────────────────────────────────────
function openModal(id) {
    const el = document.getElementById(id);
    el.style.display = 'flex';
    requestAnimationFrame(() => el.classList.add('visible'));
}
function closeModal(id) {
    const el = document.getElementById(id);
    el.classList.remove('visible');
    setTimeout(() => el.style.display = 'none', 200);
}
function overlayClick(e, id) { if (e.target.id === id) closeModal(id); }

function openTaskDetail(taskId) {
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;
    document.getElementById('detail-modal-title').textContent = task.name;
    document.getElementById('detail-modal-edit-btn').onclick = () => {
        closeModal('detail-modal');
        openEditTask(taskId);
    };
    const subtasks = task.subtasks || [];
    const doneCount = subtasks.filter(s => s.done).length;
    const subtaskRows = subtasks.map(s => {
        const subSubs = s.subtasks || [];
        const subSubRows = subSubs.map(ss => `
            <div class="subtask-item detail-subsub">
                <input type="checkbox" class="subtask-checkbox" ${ss.done ? 'checked' : ''}
                       onchange="toggleSubSubtask('${task.id}','${s.id}','${ss.id}');openTaskDetail('${task.id}')">
                <span class="subtask-name${ss.done ? ' done' : ''}">${esc(ss.name)}</span>
            </div>`).join('');
        return `
            <div class="subtask-item">
                <input type="checkbox" class="subtask-checkbox" ${s.done ? 'checked' : ''}
                       onchange="toggleSubtask('${task.id}','${s.id}');openTaskDetail('${task.id}')">
                <span class="subtask-name${s.done ? ' done' : ''}">${esc(s.name)}</span>
            </div>${subSubRows}`;
    }).join('');
    const descHtml = task.description
        ? `<p class="detail-description">${esc(task.description)}</p>`
        : `<p class="detail-description detail-empty">No description.</p>`;
    const subtasksHtml = subtasks.length === 0
        ? `<p class="detail-empty" style="font-size:13px">No subtasks.</p>`
        : subtaskRows;
    document.getElementById('detail-modal-body').innerHTML = `
        ${descHtml}
        <div class="detail-subtask-heading">Subtasks${subtasks.length > 0 ? ` (${doneCount}/${subtasks.length})` : ''}</div>
        <div>${subtasksHtml}</div>`;
    openModal('detail-modal');
}

let modalSubtasks = [];

function renderModalSubtasks() {
    const list = document.getElementById('modal-subtask-list');
    if (!list) return;
    list.innerHTML = modalSubtasks.map((s, i) => {
        const subSubs = s.subtasks || [];
        const subSubRows = subSubs.map((ss, j) => `
            <div class="subtask-item detail-subsub" style="margin-bottom:4px">
                <input type="checkbox" class="subtask-checkbox" ${ss.done ? 'checked' : ''}
                       onchange="modalSubtasks[${i}].subtasks[${j}].done=this.checked">
                <input type="text" class="modal-subtask-name-input" value="${esc(ss.name)}"
                       maxlength="120" oninput="modalSubtasks[${i}].subtasks[${j}].name=this.value">
                <button type="button" class="icon-btn danger" style="width:22px;height:22px;font-size:11px;flex-shrink:0"
                        onclick="modalSubtasks[${i}].subtasks.splice(${j},1);renderModalSubtasks()">&#x2715;</button>
            </div>`).join('');
        return `
            <div class="subtask-item" style="margin-bottom:4px">
                <input type="checkbox" class="subtask-checkbox" ${s.done ? 'checked' : ''}
                       onchange="modalSubtasks[${i}].done=this.checked">
                <input type="text" class="modal-subtask-name-input" value="${esc(s.name)}"
                       maxlength="120" oninput="modalSubtasks[${i}].name=this.value">
                <button type="button" class="icon-btn danger" style="width:22px;height:22px;font-size:11px;flex-shrink:0"
                        onclick="modalSubtasks.splice(${i},1);renderModalSubtasks()">&#x2715;</button>
            </div>
            ${subSubRows}
            <div class="detail-subsub" style="display:flex;gap:6px;margin-bottom:6px">
                <input type="text" class="subtask-input" id="modal-subsub-input-${i}"
                       placeholder="Add sub-subtask…" maxlength="120"
                       onkeydown="if(event.key==='Enter'){event.preventDefault();modalAddSubSubtask(${i})}">
                <button type="button" class="subtask-add-btn" style="font-size:11px;padding:3px 8px"
                        onclick="modalAddSubSubtask(${i})">Add</button>
            </div>`;
    }).join('');
}

function modalAddSubSubtask(i) {
    const input = document.getElementById(`modal-subsub-input-${i}`);
    const name  = input?.value.trim();
    if (!name) return;
    if (!modalSubtasks[i].subtasks) modalSubtasks[i].subtasks = [];
    modalSubtasks[i].subtasks.push({ id: uid(), name, done: false });
    input.value = '';
    renderModalSubtasks();
    const refocused = document.getElementById(`modal-subsub-input-${i}`);
    if (refocused) refocused.focus();
}

function modalAddSubtask() {
    const input = document.getElementById('modal-subtask-input');
    const name  = input.value.trim();
    if (!name) return;
    modalSubtasks.push({ id: uid(), name, done: false, subtasks: [] });
    input.value = '';
    renderModalSubtasks();
    input.focus();
}

function openAddTask() {
    state.editingTaskId = null;
    document.getElementById('task-modal-title').textContent = 'New Task';
    document.getElementById('task-name').value     = '';
    document.getElementById('task-desc').value     = '';
    document.getElementById('task-priority').value = 'medium';
    document.getElementById('task-status').value   = 'todo';
    document.getElementById('task-do-date').value  = new Date().toISOString().slice(0, 10);
    document.getElementById('task-category').value = '';
    document.getElementById('task-name').classList.remove('error');
    modalSubtasks = [];
    renderModalSubtasks();
    openModal('task-modal');
    setTimeout(() => document.getElementById('task-name').focus(), 220);
}

function openEditTask(id) {
    const t = state.tasks.find(t => t.id === id);
    if (!t) return;
    state.editingTaskId = id;
    document.getElementById('task-modal-title').textContent = 'Edit Task';
    document.getElementById('task-name').value     = t.name;
    document.getElementById('task-desc').value     = t.description || '';
    document.getElementById('task-priority').value = t.priority;
    document.getElementById('task-status').value   = t.status;
    document.getElementById('task-do-date').value  = t.doDate || '';
    document.getElementById('task-category').value = t.category || '';
    document.getElementById('task-name').classList.remove('error');
    modalSubtasks = JSON.parse(JSON.stringify(t.subtasks || []));
    renderModalSubtasks();
    openModal('task-modal');
    setTimeout(() => document.getElementById('task-name').focus(), 220);
}

function saveTask() {
    const nameEl = document.getElementById('task-name');
    const name   = nameEl.value.trim();
    if (!name) { nameEl.classList.add('error'); nameEl.focus(); return; }
    nameEl.classList.remove('error');
    // Flush any in-progress subtask name edits before saving
    document.querySelectorAll('.modal-subtask-name-input').forEach((inp, i) => {
        if (modalSubtasks[i]) modalSubtasks[i].name = inp.value.trim() || modalSubtasks[i].name;
    });

        name,
        description: document.getElementById('task-desc').value,
        priority:    document.getElementById('task-priority').value,
        status:      document.getElementById('task-status').value,
        doDate:      document.getElementById('task-do-date').value || null,
        category:    document.getElementById('task-category').value || null,
        subtasks:    modalSubtasks,

function handleAddManual(taskId) {

// ── Chart ─────────────────────────────────────
let hoursChart    = null;
let chartWeeks    = 12;   // used in weekly mode
let chartDays     = null; // non-null = daily mode (value is number of days)
let chartExpanded = true;

function getWeekStart(ts) {
    const d   = new Date(ts);
    const day = d.getDay(); // 0=Sun … 6=Sat
    const diff = (day === 0) ? -6 : 1 - day; // shift back to Monday
    d.setDate(d.getDate() + diff);
    d.setHours(0, 0, 0, 0);
    return d;
}

function buildChartData(numWeeks) {
    // Build Monday-anchored week-start timestamps, oldest → newest
    const curWeekStart = getWeekStart(Date.now());
    const weekStarts   = [];
    for (let i = numWeeks - 1; i >= 0; i--) {
        const d = new Date(curWeekStart);
        d.setDate(d.getDate() - i * 7);
        weekStarts.push(d.getTime());
    }

    const hours = new Array(numWeeks).fill(0);

    state.tasks.forEach(task => {
        (task.timeEntries || []).forEach(entry => {
            if (!entry.endTime || !entry.duration) return;
            const ts = entry.startTime;
            // Binary-search-style: find the latest weekStart <= ts
            for (let i = numWeeks - 1; i >= 0; i--) {
                if (ts >= weekStarts[i]) {
                    hours[i] += entry.duration / 3600;
                    break;
                }
            }
        });
    });

    const labels = weekStarts.map(ts =>
        new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric' })
    );
    return { labels, hours: hours.map(h => Math.round(h * 10) / 10) };
}

function buildChartDataDaily(numDays) {
    // Build array of day-start timestamps, oldest → newest
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const dayStarts = [];
    const dayMap    = new Map(); // timestamp → array index

    for (let i = numDays - 1; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        const ts = d.getTime();
        dayMap.set(ts, numDays - 1 - i);
        dayStarts.push(ts);
    }

    const hours = new Array(numDays).fill(0);

    state.tasks.forEach(task => {
        (task.timeEntries || []).forEach(entry => {
            if (!entry.endTime || !entry.duration) return;
            const d = new Date(entry.startTime);
            d.setHours(0, 0, 0, 0);
            const idx = dayMap.get(d.getTime());
            if (idx !== undefined) hours[idx] += entry.duration / 3600;
        });
    });

    // Shorter format for 28-day view so labels don't crowd
    const fmt = numDays <= 7
        ? { weekday: 'short', month: 'short', day: 'numeric' }
        : { weekday: 'short', day: 'numeric' };
    const labels = dayStarts.map(ts => new Date(ts).toLocaleDateString(undefined, fmt));
    return { labels, hours: hours.map(h => Math.round(h * 10) / 10) };
}

// Returns chart data for whichever mode is active
function getChartData() {
    return chartDays !== null ? buildChartDataDaily(chartDays) : buildChartData(chartWeeks);
}

// Max x-axis ticks for the active range
function tickLimit() {
    if (chartDays !== null) return chartDays; // show every day
    return chartWeeks <= 12 ? chartWeeks : 13;
}

// Tooltip title wording
function chartTooltipTitle(items) {
    return chartDays !== null ? items[0].label : `Week of ${items[0].label}`;
}

function initChart() {
    const canvas = document.getElementById('hours-chart');
    if (!canvas || hoursChart) return;

    const { labels, hours } = getChartData();

    hoursChart = new Chart(canvas.getContext('2d'), {
        type: 'line',

            labels,
            datasets: [{
                label: 'Hours',

                borderColor: '#4f46e5',

                borderWidth: 2.5,
                pointBackgroundColor: '#4f46e5',
                pointBorderColor: '#fff',
                pointBorderWidth: 2,
                pointRadius: 4,
                pointHoverRadius: 6,

            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            aspectRatio: 4,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        title: items => chartTooltipTitle(items),
                        label: item  => ` ${item.parsed.y}h tracked`,
                    },
                    backgroundColor: '#1f2937',

                    bodyColor: '#d1d5db',

                }

function updateChart() {
    if (!hoursChart) return;
    const { labels, hours } = getChartData();
    hoursChart.data.labels                              = labels;
    hoursChart.data.datasets[0].data                    = hours;
    hoursChart.options.scales.x.ticks.maxTicksLimit     = tickLimit();
    hoursChart.update('none');

    // Update heading text
    const titleEl = document.querySelector('.chart-title');
    if (titleEl) {
        titleEl.innerHTML = chartDays !== null
            ? '&#x1F4C8; Daily Hours'
            : '&#x1F4C8; Weekly Hours';

}

function toggleChart() {
    chartExpanded = !chartExpanded;
    const body = document.getElementById('chart-body');
    body.classList.toggle('collapsed', !chartExpanded);
    document.getElementById('chart-chevron').classList.toggle('up', chartExpanded);
    // After the CSS transition ends, tell Chart.js to remeasure the container.
    // Without this it caches the 0px collapsed size and stays tiny on re-expand.
    if (chartExpanded && hoursChart) {

}

function setChartRange(val) {
    if (val.startsWith('d')) {
        chartDays  = parseInt(val.slice(1));

}

// ── Calendar View ──────────────────────────────
const CAL_ZOOM_LEVELS = [32, 48, 64, 80, 100, 120, 150, 180, 240, 320]; // pixels per hour options
let   calZoomIdx      = 2;  // default: 64px/hr
const CAL_SNAP_MINS   = 5;  // drag snaps to 5-minute intervals

function calHourPx() { return CAL_ZOOM_LEVELS[calZoomIdx]; }

function calZoom(dir) {
    const next = calZoomIdx + dir;
    if (next < 0 || next >= CAL_ZOOM_LEVELS.length) return;
    // Remember scroll position as a fraction of total height so the view stays centred
    const scroll   = document.getElementById('cal-body-scroll');
    const fraction = scroll ? scroll.scrollTop / (calHourPx() * 24) : 8 / 24;
    calZoomIdx = next;
    renderCalendar();
    if (scroll) scroll.scrollTop = fraction * calHourPx() * 24;
}

let calDrag     = null;  // active resize drag state
let calDragged  = false; // true if pointer actually moved during drag

// Assigns each entry a lane (sub-column) so overlapping entries don't stack.
// Returns a copy of items with added {lane, laneCount} fields.
function calLayoutEntries(items) {
    if (!items.length) return [];
    const sorted = items.slice().sort((a, b) => a.entry.startTime - b.entry.startTime);

    // Greedy lane assignment: put each entry in the first lane whose last
    // entry has already ended by this entry's start time.
    const laneEnds = []; // endTime of the last entry placed in each lane
    sorted.forEach(item => {
        let l = laneEnds.findIndex(end => end <= item.entry.startTime);
        if (l < 0) l = laneEnds.push(0) - 1;
        laneEnds[l] = item.entry.endTime;
        item.lane = l;
    });

    // laneCount for an entry = the highest lane index among all entries that
    // overlap with it, + 1.  This makes every entry in an overlapping group
    // share the same column count so they tile cleanly.
    sorted.forEach(item => {
        let maxLane = item.lane;
        sorted.forEach(other => {
            if (other !== item &&
                other.entry.startTime < item.entry.endTime &&
                other.entry.endTime   > item.entry.startTime) {
                maxLane = Math.max(maxLane, other.lane);
            }
        });
        item.laneCount = maxLane + 1;
    });

    return sorted;
}

function calNavWeek(delta) {
    state.calendarWeekOffset += delta;
    renderCalendar();
}

function renderCalendar() {
    if (state.view !== 'calendar') return;

    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const todayStr = today.toISOString().slice(0, 10);

    // Week starts on Sunday
    const weekStart = new Date(today);
    weekStart.setDate(today.getDate() - today.getDay() + state.calendarWeekOffset * 7);

    const days = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(weekStart);
        d.setDate(weekStart.getDate() + i);
        return d;
    });

    // Week label
    const fmt = d => d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    const labelEl = document.getElementById('cal-week-label');
    if (labelEl) {
        const sameYear = days[0].getFullYear() === days[6].getFullYear();
        labelEl.textContent = sameYear
            ? `${fmt(days[0])} – ${fmt(days[6])}, ${days[0].getFullYear()}`
            : `${fmt(days[0])}, ${days[0].getFullYear()} – ${fmt(days[6])}, ${days[6].getFullYear()}`;
    }

    // Zoom label + button state
    const zoomLabelEl = document.getElementById('cal-zoom-label');
    if (zoomLabelEl) zoomLabelEl.textContent = calHourPx() + 'px';

    // Build dateStr → [{task, entry}] map for this week
    const dayMap = new Map();
    days.forEach(d => dayMap.set(d.toISOString().slice(0, 10), []));
    state.tasks.forEach(task => {
        (task.timeEntries || []).forEach(entry => {
            if (!entry.startTime || !entry.endTime) return;
            const dateStr = new Date(entry.startTime).toISOString().slice(0, 10);
            if (dayMap.has(dateStr)) dayMap.get(dateStr).push({ task, entry });
        });
    });

    // ── Header row ──
    const headEl = document.getElementById('cal-head-row');
    if (headEl) {
        const DAY_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        headEl.innerHTML = '<div class="cal-gutter-head"></div>' +
            days.map((d, i) => {
                const ds      = d.toISOString().slice(0, 10);
                const isToday = ds === todayStr;
                return `<div class="cal-day-head${isToday ? ' is-today' : ''}">
                    <span class="cal-day-name">${DAY_NAMES[i]}</span>
                    <span class="cal-day-num${isToday ? ' is-today' : ''}">${d.getDate()}</span>
                </div>`;
            }).join('');
    }

    // ── Time axis ──
    const axisEl = document.getElementById('cal-time-axis');
    if (axisEl) {
        let html = '';
        for (let h = 0; h <= 24; h++) {
            const label = h === 0 ? '' : h < 12 ? `${h}am` : h === 12 ? '12pm' : `${h - 12}pm`;
            html += `<div class="cal-hour-label" style="top:${h * calHourPx()}px">${label}</div>`;
        }
        axisEl.innerHTML = html;
        axisEl.style.height = (24 * calHourPx()) + 'px';
    }

    // ── Day columns ──
    const colsEl = document.getElementById('cal-columns');
    if (!colsEl) return;

    let colsHtml = '';
    days.forEach(d => {
        const ds      = d.toISOString().slice(0, 10);
        const isToday = ds === todayStr;
        const entries = dayMap.get(ds) || [];

        let inner = '';

        // Hour and half-hour lines
        for (let h = 0; h < 24; h++) {
            inner += `<div class="cal-hour-line" style="top:${h * calHourPx()}px"></div>`;
            inner += `<div class="cal-half-line" style="top:${h * calHourPx() + calHourPx() / 2}px"></div>`;
        }

        // Current-time indicator
        if (isToday) {
            const now   = new Date();
            const topPx = (now.getHours() + now.getMinutes() / 60) * calHourPx();
            inner += `<div class="cal-now-line" style="top:${topPx.toFixed(1)}px"></div>`;
        }

        // Time entry blocks — lay out overlapping entries side by side
        const EDGE = 3; // px gap at column edges
        const GAP  = 2; // px gap between lanes
        calLayoutEntries(entries).forEach(({ task, entry, lane, laneCount }) => {
            const startDate  = new Date(entry.startTime);
            const dayEndMs   = new Date(ds + 'T00:00:00').getTime() + 86400000;
            const clippedEnd = Math.min(entry.endTime, dayEndMs);
            const durMs      = clippedEnd - entry.startTime;

            const topPx    = (startDate.getHours() + startDate.getMinutes() / 60 + startDate.getSeconds() / 3600) * calHourPx();
            const heightPx = Math.max(2, (durMs / 3600000) * calHourPx());

            const cat     = task.category ? state.categories.find(c => c.id === task.category) : null;
            const color   = cat ? cat.color : '#4f46e5';
            const bgAlpha = document.body.classList.contains('dark') ? '33' : '18';
            const bg      = color + bgAlpha;

            const fmtTime = ms => new Date(ms).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
            const isDragging = calDrag?.entryId === entry.id;
            const tipTime = `${fmtTime(entry.startTime)} – ${fmtTime(entry.endTime)}`;
            const tipDur  = fmtSecs(entry.duration);

            // Horizontal position: divide the column evenly among laneCount lanes
            const pctPerLane  = 100 / laneCount;
            const leftPct     = lane * pctPerLane;
            const rightPct    = (laneCount - lane - 1) * pctPerLane;
            const leftPad     = lane === 0            ? EDGE : GAP;
            const rightPad    = lane === laneCount - 1 ? EDGE : GAP;
            const leftStyle   = `calc(${leftPct.toFixed(4)}% + ${leftPad}px)`;
            const rightStyle  = `calc(${rightPct.toFixed(4)}% + ${rightPad}px)`;

            inner += `<div class="cal-entry${isDragging ? ' cal-dragging' : ''}"
                style="top:${topPx.toFixed(1)}px;height:${heightPx.toFixed(1)}px;border-color:${color};background:${bg};left:${leftStyle};right:${rightStyle}"
                data-entry-id="${entry.id}"
                data-tip-name="${esc(task.name)}"
                data-tip-time="${tipTime}"
                data-tip-dur="${tipDur}"
                onmouseenter="calTooltipShow(event,this)"
                onmouseleave="calTooltipHide()">
                <div class="cal-entry-handle-top"
                     onmousedown="calResizeStart(event,'${task.id}','${entry.id}','start')"></div>
                <div class="cal-entry-body" onclick="calEntryClick(event,'${task.id}')"></div>
                <div class="cal-entry-handle-bot"
                     onmousedown="calResizeStart(event,'${task.id}','${entry.id}','end')"></div>
            </div>`;
        });

        colsHtml += `<div class="cal-day-col${isToday ? ' is-today' : ''}" style="height:${24 * calHourPx()}px">${inner}</div>`;
    });
    colsEl.innerHTML = colsHtml;
    colsEl.style.height = (24 * calHourPx()) + 'px';
}

function calTooltipShow(e, el) {
    const tip = document.getElementById('cal-tooltip');
    if (!tip) return;
    tip.querySelector('.cal-tip-name').textContent = el.dataset.tipName || '';
    tip.querySelector('.cal-tip-time').textContent = el.dataset.tipTime || '';
    tip.querySelector('.cal-tip-dur').textContent  = el.dataset.tipDur  || '';

    // Position to the right of the entry; flip left if near the viewport edge
    tip.classList.add('visible');
    const rect  = el.getBoundingClientRect();
    const tipW  = tip.offsetWidth;
    const tipH  = tip.offsetHeight;
    let left = rect.right + 10;
    if (left + tipW > window.innerWidth - 8) left = rect.left - tipW - 10;
    const top = Math.max(8, Math.min(rect.top, window.innerHeight - tipH - 8));
    tip.style.left = left + 'px';
    tip.style.top  = top  + 'px';

    // Dim all other entries
    const colsEl = document.getElementById('cal-columns');
    if (colsEl) {
        colsEl.classList.add('has-hover');
        el.classList.add('cal-hovered');
    }
}

function calTooltipHide() {
    const tip = document.getElementById('cal-tooltip');
    if (tip) tip.classList.remove('visible');

    const colsEl = document.getElementById('cal-columns');
    if (colsEl) {
        colsEl.classList.remove('has-hover');
        colsEl.querySelectorAll('.cal-hovered').forEach(el => el.classList.remove('cal-hovered'));
    }
}

function calEntryClick(e, taskId) {
    if (calDragged) return; // suppress click after a drag
    openTaskDetail(taskId);
}

function calResizeStart(e, taskId, entryId, type) {
    e.preventDefault();
    e.stopPropagation();
    calTooltipHide();
    const task  = state.tasks.find(t => t.id === taskId);
    const entry = task?.timeEntries.find(en => en.id === entryId);
    if (!entry) return;
    calDrag    = { taskId, entryId, type, startY: e.clientY, origStart: entry.startTime, origEnd: entry.endTime };
    calDragged = false;
    document.addEventListener('mousemove', calResizeMove);
    document.addEventListener('mouseup',   calResizeEnd);
}

function calResizeMove(e) {
    if (!calDrag) return;
    calDragged = true;

    const SNAP_MS = CAL_SNAP_MINS * 60 * 1000;
    const MIN_MS  = 60 * 1000; // 1-minute minimum duration

    const task  = state.tasks.find(t => t.id === calDrag.taskId);
    const entry = task?.timeEntries.find(en => en.id === calDrag.entryId);
    if (!entry) return;

    const deltaMs = ((e.clientY - calDrag.startY) / calHourPx()) * 3600000;

    if (calDrag.type === 'start') {
        const raw      = calDrag.origStart + deltaMs;
        const snapped  = Math.round(raw / SNAP_MS) * SNAP_MS;
        if (calDrag.origEnd - snapped >= MIN_MS) {
            entry.startTime = snapped;
            entry.duration  = Math.round((entry.endTime - entry.startTime) / 1000);
        }
    } else {
        const raw      = calDrag.origEnd + deltaMs;
        const snapped  = Math.round(raw / SNAP_MS) * SNAP_MS;
        if (snapped - calDrag.origStart >= MIN_MS) {
            entry.endTime  = snapped;
            entry.duration = Math.round((entry.endTime - entry.startTime) / 1000);
        }
    }
    renderCalendar();
}

function calResizeEnd() {
    document.removeEventListener('mousemove', calResizeMove);
    document.removeEventListener('mouseup',   calResizeEnd);
    if (!calDrag) return;

    if (calDragged) {
        // Recalculate task totalSeconds from all entries
        const task = state.tasks.find(t => t.id === calDrag.taskId);
        if (task) {
            task.totalSeconds = task.timeEntries.reduce((s, en) => s + Math.max(0, en.duration || 0), 0);
        }
        save();
        render();
    }
    calDrag = null;
    // Keep calDragged true briefly so the click handler on the entry body can ignore it
    setTimeout(() => { calDragged = false; }, 0);
}

// ── View / Tab switching ───────────────────────
function setView(v) {
    state.view = v;
    localStorage.setItem('tt_view', v);
    document.querySelectorAll('.tab-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.view === v)
    );
    document.getElementById('list-view').style.display     = v === 'list'     ? '' : 'none';
    document.getElementById('board-view').style.display    = v === 'board'    ? '' : 'none';
    document.getElementById('calendar-view').style.display = v === 'calendar' ? '' : 'none';
    if (v === 'board')    renderBoard();
    if (v === 'calendar') {
        renderCalendar();
        // Scroll to 8am on first show
        const scroll = document.getElementById('cal-body-scroll');
        if (scroll) scroll.scrollTop = 8 * calHourPx();
    }
}

// ── Kanban Board ───────────────────────────────
let dragTaskId   = null;
let dragOverCard = null; // { taskId, position: 'before'|'after' }
let dragGroupId  = null; // category id being dragged for group reorder

function formatDoDateLabel(doDate, todayStr) {
    if (!doDate) return 'Unscheduled';
    const diffDays = Math.round(
        (new Date(doDate + 'T00:00:00') - new Date(todayStr + 'T00:00:00')) / 86400000
    );
    if (diffDays === 0)  return 'Today';
    if (diffDays === -1) return 'Yesterday';
    if (diffDays === 1)  return 'Tomorrow';
    if (diffDays > 1 && diffDays <= 6)
        return new Date(doDate + 'T00:00:00').toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
    return new Date(doDate + 'T00:00:00').toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
}

function kanbanCardHtml(task) {
    const isRunning   = state.activeTimer?.taskId === task.id;
    const total       = taskTotal(task);
    const isDone      = task.status === 'completed';
    const cat         = task.category ? state.categories.find(c => c.id === task.category) : null;
    const hasSubtasks = task.subtasks && task.subtasks.length > 0;
    return `
    <div class="kanban-card priority-${task.priority} status-${task.status}${isRunning ? ' running' : ''}"
         draggable="true" data-task-id="${task.id}"
         ondragstart="kDragStart(event)" ondragend="kDragEnd(event)"
         ondragover="kCardDragOver(event,'${task.id}')" ondragleave="kCardDragLeave(event)"
         ondrop="kCardDrop(event,'${task.id}')"
         ${hasSubtasks ? `onmouseenter="showSubtaskTooltip(event,'${task.id}')" onmouseleave="hideSubtaskTooltip()"` : ''}>
        <div class="kanban-card-name" onclick="openTaskDetail('${task.id}')">
            ${isRunning ? '<span class="dot" style="margin-right:5px;vertical-align:middle"></span>' : ''}${esc(task.name)}
        </div>
        <div class="kanban-card-meta">
            <span class="badge badge-${task.priority}">${task.priority}</span>
            <span class="badge badge-${task.status}">${task.status.replace('-',' ')}</span>
            ${cat ? `<span class="cat-badge" style="background:${cat.color};font-size:9px;padding:1px 6px">${esc(cat.name)}</span>` : ''}
            ${total > 0 ? `<span class="kanban-card-time">${fmtSecs(total)}</span>` : ''}
        </div>
        <div class="kanban-card-actions">
            <button class="icon-btn" onclick="shiftTaskDate('${task.id}',-1)" title="Move to previous day">&#x2190;</button>
            <button class="icon-btn" onclick="openEditTask('${task.id}')" title="Edit">&#x270E;</button>
            <button class="icon-btn success" onclick="toggleComplete('${task.id}')" title="${isDone ? 'Reopen' : 'Complete'}">
                ${isDone ? '&#x21A9;' : '&#x2713;'}
            </button>
            ${!isDone && !isRunning ? `<button class="icon-btn" onclick="startTimer('${task.id}')" title="Start timer">&#x25B6;</button>` : ''}
            ${isRunning             ? `<button class="icon-btn danger" onclick="stopTimer(true)" title="Stop timer">&#x23F9;</button>` : ''}
            <button class="icon-btn" onclick="shiftTaskDate('${task.id}',1)" title="Move to next day">&#x2192;</button>
        </div>
    </div>`;
}

function kanbanColHtml(doDate, tasks, todayStr) {
    const label     = formatDoDateLabel(doDate, todayStr);
    const isToday   = doDate === todayStr;
    const isPast    = doDate && doDate < todayStr;
    const titleCls  = isToday ? 'is-today' : (isPast ? 'is-past' : '');
    const dayOfWeek = doDate ? new Date(doDate + 'T00:00:00').getDay() : -1; // 0=Sun, 6=Sat
    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
    const safeDate  = doDate || '';
    return `
    <div class="kanban-col${isWeekend ? ' is-weekend' : ''}"
         ondragover="kDragOver(event)" ondrop="kDrop(event)" ondragleave="kDragLeave(event)"
         data-do-date="${safeDate}">
        <div class="kanban-col-header">
            <span class="kanban-col-title ${titleCls}">${isToday ? '&#11088; ' : ''}${label}</span>
            <span class="kanban-col-count">${tasks.length}</span>
        </div>
        <div class="kanban-col-body">
            ${tasks.length === 0
                ? '<div class="kanban-drop-hint">Drop tasks here</div>'
                : tasks.map(t => kanbanCardHtml(t)).join('')}
        </div>
    </div>`;
}

function renderBoard() {
    const scroll = document.getElementById('kanban-scroll');
    if (!scroll) return;

    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const todayStr = today.toISOString().slice(0, 10);

    // Group tasks by doDate (apply board filters first)
    const groups = new Map();  // doDate string → task[]
    const unscheduled = [];

    state.tasks.forEach(task => {
        // Apply status filter
        if (state.boardHiddenStatuses.has(task.status)) return;
        // Apply category filter (use '' as key for uncategorized tasks)
        const catKey = task.category || '';
        if (state.boardHiddenCategories.has(catKey)) return;

        if (!task.doDate) {
            unscheduled.push(task);
        } else {
            if (!groups.has(task.doDate)) groups.set(task.doDate, []);
            groups.get(task.doDate).push(task);
        }
    });

    // Always show today even if empty
    if (!groups.has(todayStr)) groups.set(todayStr, []);

    // Always show an empty slot for the day after the last task date
    const taskDates = [...groups.keys()].filter(d => d); // exclude nulls
    if (taskDates.length > 0) {
        const lastDate = taskDates.reduce((a, b) => a > b ? a : b);
        const dayAfter = new Date(lastDate + 'T00:00:00');
        dayAfter.setDate(dayAfter.getDate() + 1);
        const dayAfterStr = dayAfter.toISOString().slice(0, 10);
        if (!groups.has(dayAfterStr)) groups.set(dayAfterStr, []);
    }

    // Sort columns chronologically
    const sorted = [...groups.entries()].sort(([a], [b]) => a.localeCompare(b));

    // Snapshot scroll positions before rebuilding so they can be restored after
    const colScrolls = {};
    scroll.querySelectorAll('.kanban-col').forEach(col => {
        const body = col.querySelector('.kanban-col-body');
        if (body && body.scrollTop) colScrolls[col.dataset.doDate ?? '__none__'] = body.scrollTop;
    });
    const boardScrollLeft = scroll.scrollLeft;

    // Build HTML: dated columns (with gap indicators) then unscheduled
    let boardHtml = '';
    for (let i = 0; i < sorted.length; i++) {
        const [date, tasks] = sorted[i];
        if (i > 0) {
            const prevDate = sorted[i - 1][0];
            if (prevDate && date) {
                const gap = Math.round(
                    (new Date(date + 'T00:00:00') - new Date(prevDate + 'T00:00:00')) / 86400000
                ) - 1; // number of hidden days
                if (gap > 0) boardHtml += kanbanGapHtml(gap);
            }
        }
        boardHtml += kanbanColHtml(date, tasks, todayStr);
    }
    boardHtml += kanbanColHtml(null, unscheduled, todayStr);
    scroll.innerHTML = boardHtml;

    // Restore scroll positions
    scroll.querySelectorAll('.kanban-col').forEach(col => {
        const saved = colScrolls[col.dataset.doDate ?? '__none__'];
        if (saved) col.querySelector('.kanban-col-body').scrollTop = saved;
    });
    scroll.scrollLeft = boardScrollLeft;
}

function kanbanGapHtml(hiddenDays) {
    const label = hiddenDays === 1 ? '1 day' : `${hiddenDays} days`;
    return `<div class="kanban-gap">
        <div class="kanban-gap-dots">•••</div>
        <div class="kanban-gap-label">${label}</div>
    </div>`;
}

// ── Kanban Subtask Tooltip ─────────────────────
function showSubtaskTooltip(e, taskId) {
    const task = state.tasks.find(t => t.id === taskId);
    if (!task || !task.subtasks || task.subtasks.length === 0) return;

    const subtasks  = task.subtasks;
    const topDone   = subtasks.filter(s => s.done).length;
    const subsDone  = subtasks.reduce((n, s) => n + (s.subtasks || []).filter(ss => ss.done).length, 0);
    const subsTotal = subtasks.reduce((n, s) => n + (s.subtasks || []).length, 0);
    const totalDone = topDone + subsDone;
    const total     = subtasks.length + subsTotal;

    let html = `<div class="kst-header">Subtasks &nbsp;${totalDone} / ${total}</div>`;
    subtasks.forEach(s => {
        html += `<div class="kst-item${s.done ? ' done' : ''}">
            <span class="kst-check">${s.done ? '✓' : '○'}</span><span>${esc(s.name)}</span>
        </div>`;
        (s.subtasks || []).forEach(ss => {
            html += `<div class="kst-item kst-sub${ss.done ? ' done' : ''}">
                <span class="kst-check">${ss.done ? '✓' : '○'}</span><span>${esc(ss.name)}</span>
            </div>`;
        });
    });

    const tip = document.getElementById('kanban-subtask-tooltip');
    tip.innerHTML = html;
    tip.style.display = 'block';

    const card = e.currentTarget.getBoundingClientRect();
    const tw   = tip.offsetWidth  || 220;
    const th   = tip.offsetHeight || 80;
    const vw   = window.innerWidth;
    const vh   = window.innerHeight;

    const left = (card.right + tw + 8 <= vw) ? card.right + 8 : card.left - tw - 8;
    const top  = Math.min(card.top, vh - th - 8);
    tip.style.left = Math.max(8, left) + 'px';
    tip.style.top  = Math.max(8, top)  + 'px';
}

function hideSubtaskTooltip() {
    const tip = document.getElementById('kanban-subtask-tooltip');
    if (tip) tip.style.display = 'none';
}

// ── Kanban Drag & Drop ─────────────────────────
function kDragStart(e) {
    dragTaskId = e.currentTarget.dataset.taskId;
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    hideSubtaskTooltip();
}

function kDragEnd(e) {
    e.currentTarget.classList.remove('dragging');
    document.querySelectorAll('.kanban-col.drag-over')
        .forEach(c => c.classList.remove('drag-over'));
    document.querySelectorAll('.kanban-card.drag-above, .kanban-card.drag-below')
        .forEach(c => c.classList.remove('drag-above', 'drag-below'));
    dragOverCard = null;
}

function kDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('drag-over');
}

function kDragLeave(e) {
    // Only clear highlight when leaving the column entirely (not just a child)
    if (!e.currentTarget.contains(e.relatedTarget)) {
        e.currentTarget.classList.remove('drag-over');
    }
}

function kDrop(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    if (!dragTaskId) return;
    const newDate = e.currentTarget.dataset.doDate || null;
    const task = state.tasks.find(t => t.id === dragTaskId);
    if (task) { task.doDate = newDate; save(); renderBoard(); }
    dragTaskId   = null;
    dragOverCard = null;
}

// ── Card-level drag: reorder within / across columns ──────────────
function kCardDragOver(e, taskId) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (dragTaskId === taskId) return; // hovering over self — ignore

    const rect     = e.currentTarget.getBoundingClientRect();
    const position = e.clientY < rect.top + rect.height / 2 ? 'before' : 'after';

    // Update indicator on this card only
    e.currentTarget.classList.toggle('drag-above', position === 'before');
    e.currentTarget.classList.toggle('drag-below', position === 'after');
    dragOverCard = { taskId, position };
}

function kCardDragLeave(e) {
    if (!e.currentTarget.contains(e.relatedTarget)) {
        e.currentTarget.classList.remove('drag-above', 'drag-below');
    }
}

function kCardDrop(e, taskId) {
    e.preventDefault();
    e.stopPropagation(); // prevent the column's kDrop from also firing
    e.currentTarget.classList.remove('drag-above', 'drag-below');

    if (!dragTaskId || dragTaskId === taskId) { dragOverCard = null; return; }

    const position   = dragOverCard?.position ?? 'after';
    const col        = e.currentTarget.closest('.kanban-col');
    const newDate    = col?.dataset.doDate || null;
    const draggedIdx = state.tasks.findIndex(t => t.id === dragTaskId);
    if (draggedIdx === -1) return;

    // Update the dragged task's date to match the target column
    state.tasks[draggedIdx].doDate = newDate || null;

    // Remove dragged task from its current position, then re-insert next to target
    const [dragged]    = state.tasks.splice(draggedIdx, 1);
    const newTargetIdx = state.tasks.findIndex(t => t.id === taskId);
    const insertIdx    = position === 'before' ? newTargetIdx : newTargetIdx + 1;
    state.tasks.splice(insertIdx < 0 ? state.tasks.length : insertIdx, 0, dragged);

    save();
    renderBoard();
    dragTaskId   = null;
    dragOverCard = null;
}

function shiftTaskDate(taskId, days) {
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;
    // If unscheduled, base off today before shifting
    const base = task.doDate ? new Date(task.doDate + 'T00:00:00') : (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();
    base.setDate(base.getDate() + days);
    task.doDate = base.toISOString().slice(0, 10);
    save();
    renderBoard();
}

// ── Categories ────────────────────────────────
function addCategory(name, color) {
    if (!currentUser || !categoriesRef) return;
    const id  = uid();
    const cat = { id, name, color, createdAt: Date.now(), order: state.categories.length };
    categoriesRef.child(id).set(cat)
        .catch(err => console.error('Add category error:', err.message));
    // Firebase listener will update state.categories and call updateCategorySelects() + render()
}

function deleteCategory(id) {
    if (!currentUser || !categoriesRef) return;
    categoriesRef.child(id).remove()
        .catch(err => console.error('Delete category error:', err.message));
    // Clear this category from any tasks that use it
    let changed = false;
    state.tasks.forEach(t => { if (t.category === id) { t.category = null; changed = true; } });
    if (changed) save();
    // Remove deleted category from list/board filter sets so it doesn't stay hidden
    state.listHiddenCategories.delete(id);
    state.boardHiddenCategories.delete(id);
    render();
}

function openCategoryManager() {
    renderCategoryManager();
    openModal('cat-modal');
}

function renderCategoryManager() {
    const body = document.getElementById('cat-modal-body');
    if (!body) return;

    const existingHtml = state.categories.length === 0
        ? '<p style="color:var(--text-muted);font-size:13px;margin-bottom:16px">No categories yet.</p>'
        : state.categories.map(c => `
            <div class="cat-item">
                <span class="cat-dot" style="width:14px;height:14px;background:${c.color}"></span>
                <span style="flex:1;font-size:14px">${esc(c.name)}</span>
                <button class="icon-btn danger" onclick="deleteCategory('${c.id}');renderCategoryManager()" title="Delete">&#x2715;</button>
            </div>`).join('');

    const colorGrid = CAT_COLORS.map((color, i) => `
        <div class="cat-color-swatch${i === 0 ? ' selected' : ''}"
             style="background:${color}"
             data-color="${color}"
             onclick="selectCatColor(this)"></div>`).join('');

    body.innerHTML = `
        <div id="cat-list" style="margin-bottom:16px">${existingHtml}</div>
        <div style="border-top:1px solid var(--border);padding-top:16px">
            <div class="section-label" style="margin-bottom:10px">New Category</div>
            <div class="form-group">
                <label for="new-cat-name">Name</label>
                <input type="text" id="new-cat-name" placeholder="e.g. Work, Personal, Errands…" maxlength="40"
                       onkeydown="if(event.key==='Enter')submitNewCategory()">
            </div>
            <div class="form-group">
                <label>Color</label>
                <div class="cat-color-grid" id="cat-color-grid">${colorGrid}</div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="submitNewCategory()">Add Category</button>
        </div>`;
}

function selectCatColor(el) {
    document.querySelectorAll('#cat-color-grid .cat-color-swatch')
        .forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
}

function submitNewCategory() {
    const nameEl = document.getElementById('new-cat-name');
    if (!nameEl) return;
    const name = nameEl.value.trim();
    if (!name) { nameEl.classList.add('error'); nameEl.focus(); return; }
    nameEl.classList.remove('error');
    const selSwatch = document.querySelector('#cat-color-grid .cat-color-swatch.selected');
    const color = selSwatch ? selSwatch.dataset.color : CAT_COLORS[0];
    addCategory(name, color);
    nameEl.value = '';
    // Re-render the manager (the Firebase listener will eventually update the list,
    // but we can also call renderCategoryManager after a short delay for instant feedback)
    setTimeout(renderCategoryManager, 300);
}

function toggleGroupByCategory() {
    state.groupByCategory = !state.groupByCategory;
    localStorage.setItem('tt_group', state.groupByCategory ? '1' : '0');
    const btn = document.getElementById('group-btn');
    if (btn) btn.classList.toggle('active', state.groupByCategory);
    render();
}

function updateCategorySelects() {
    // Update the task-modal category dropdown
    const taskCatSel = document.getElementById('task-category');
    if (taskCatSel) {
        const prev = taskCatSel.value;
        taskCatSel.innerHTML = '<option value="">— None —</option>' +
            state.categories.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
        if (state.categories.find(c => c.id === prev)) taskCatSel.value = prev;
    }
    // Update list and board view category filter dropdowns
    renderListCategoryDropdown();
    renderBoardCategoryDropdown();
}

// ── Category Group Collapse ───────────────────
function toggleGroupCollapse(groupId) {
    if (state.collapsedGroups.has(groupId)) {
        state.collapsedGroups.delete(groupId);
    } else {
        state.collapsedGroups.add(groupId);
    }
    renderTasks();
}

// ── Category Group Drag-to-Reorder ───────────
function groupDragStart(e, catId) {
    dragGroupId = catId;
    e.dataTransfer.effectAllowed = 'move';
    // Slight delay so the drag image renders before we style the element
    setTimeout(() => e.target.closest('.task-group').classList.add('dragging'), 0);
}

function groupDragEnd(e) {
    dragGroupId = null;
    document.querySelectorAll('.task-group').forEach(g =>
        g.classList.remove('dragging', 'drag-above', 'drag-below'));
}

function groupDragOver(e, catId) {
    if (!dragGroupId || dragGroupId === catId) return;
    e.preventDefault();
    const rect = e.currentTarget.getBoundingClientRect();
    const before = e.clientY < rect.top + rect.height / 2;
    document.querySelectorAll('.task-group').forEach(g =>
        g.classList.remove('drag-above', 'drag-below'));
    e.currentTarget.classList.add(before ? 'drag-above' : 'drag-below');
}

function groupDragLeave(e) {
    // Only clear if leaving the group entirely (not entering a child)
    if (!e.currentTarget.contains(e.relatedTarget)) {
        e.currentTarget.classList.remove('drag-above', 'drag-below');
    }
}

function groupDrop(e, targetCatId) {
    e.preventDefault();
    document.querySelectorAll('.task-group').forEach(g =>
        g.classList.remove('drag-above', 'drag-below', 'dragging'));
    if (!dragGroupId || dragGroupId === targetCatId) { dragGroupId = null; return; }

    const cats = [...state.categories];
    const fromIdx = cats.findIndex(c => c.id === dragGroupId);
    const toIdx   = cats.findIndex(c => c.id === targetCatId);
    if (fromIdx === -1 || toIdx === -1) { dragGroupId = null; return; }

    const rect = e.currentTarget.getBoundingClientRect();
    const insertBefore = e.clientY < rect.top + rect.height / 2;

    const [moved] = cats.splice(fromIdx, 1);
    const newToIdx = cats.findIndex(c => c.id === targetCatId);
    cats.splice(insertBefore ? newToIdx : newToIdx + 1, 0, moved);

    // Persist new order to Firebase
    if (currentUser && categoriesRef) {
        const updates = {};
        cats.forEach((cat, i) => { updates[cat.id + '/order'] = i; });
        categoriesRef.update(updates).catch(err => console.error('Reorder error:', err));
    }

    // Optimistic local update
    state.categories = cats;
    dragGroupId = null;
    renderTasks();
}

// ── List View Filters ─────────────────────────
function toggleListStatusFilter(status, checked) {
    if (checked) {
        state.listHiddenStatuses.delete(status);
    } else {
        state.listHiddenStatuses.add(status);
    }
    updateBoardFilterBtnState('list-status-filter-btn', state.listHiddenStatuses.size > 0);
    renderTasks();
}

function toggleListCategoryFilter(catId, checked) {
    if (checked) {
        state.listHiddenCategories.delete(catId);
    } else {
        state.listHiddenCategories.add(catId);
    }
    updateBoardFilterBtnState('list-cat-filter-btn', state.listHiddenCategories.size > 0);
    renderTasks();
}

function renderListCategoryDropdown() {
    const dropdown = document.getElementById('list-cat-dropdown');
    if (!dropdown) return;

    // Drop stale IDs from hidden set
    const validIds = new Set(state.categories.map(c => c.id));
    validIds.add('');
    state.listHiddenCategories.forEach(id => {
        if (!validIds.has(id)) state.listHiddenCategories.delete(id);
    });

    const items = [];
    const noneChecked = !state.listHiddenCategories.has('');
    items.push(`<label class="board-filter-item">
        <input type="checkbox" ${noneChecked ? 'checked' : ''} onchange="toggleListCategoryFilter('', this.checked)">
        <span style="color:var(--text-muted);font-style:italic">Uncategorized</span>
    </label>`);

    state.categories.forEach(c => {
        const isChecked = !state.listHiddenCategories.has(c.id);
        items.push(`<label class="board-filter-item">
            <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleListCategoryFilter('${c.id}', this.checked)">
            <span class="cat-dot-sm" style="background:${c.color}"></span>
            ${esc(c.name)}
        </label>`);
    });

    if (items.length === 1) {
        items.push(`<div style="padding:4px 8px;font-size:12px;color:var(--text-muted)">No categories yet</div>`);
    }

    dropdown.innerHTML = items.join('');
    updateBoardFilterBtnState('list-cat-filter-btn', state.listHiddenCategories.size > 0);
}

// ── Board View Filters ────────────────────────
function toggleBoardFilterDropdown(id) {
    const target = document.getElementById(id);
    if (!target) return;
    const isOpen = target.classList.contains('open');
    // Close all dropdowns first
    document.querySelectorAll('.board-filter-dropdown').forEach(d => d.classList.remove('open'));
    if (!isOpen) target.classList.add('open');
}

// Close board dropdowns when clicking outside
document.addEventListener('click', function(e) {
    if (!e.target.closest('.board-filter-wrapper')) {
        document.querySelectorAll('.board-filter-dropdown').forEach(d => d.classList.remove('open'));
    }
});

function toggleBoardStatusFilter(status, checked) {
    if (checked) {
        state.boardHiddenStatuses.delete(status);
    } else {
        state.boardHiddenStatuses.add(status);
    }
    localStorage.setItem('tt_board_st',  JSON.stringify([...state.boardHiddenStatuses]));
    updateBoardFilterBtnState('board-status-filter-btn', state.boardHiddenStatuses.size > 0);
    renderBoard();
}

function toggleBoardCategoryFilter(catId, checked) {
    if (checked) {
        state.boardHiddenCategories.delete(catId);
    } else {
        state.boardHiddenCategories.add(catId);
    }
    localStorage.setItem('tt_board_cat', JSON.stringify([...state.boardHiddenCategories]));
    updateBoardFilterBtnState('board-cat-filter-btn', state.boardHiddenCategories.size > 0);
    renderBoard();
}

function updateBoardFilterBtnState(btnId, isActive) {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    if (isActive) {
        btn.classList.add('active');
    } else {
        btn.classList.remove('active');
    }
}

function renderBoardCategoryDropdown() {
    const dropdown = document.getElementById('board-cat-dropdown');
    if (!dropdown) return;

    // Remove any category IDs from hidden set that no longer exist
    const validIds = new Set(state.categories.map(c => c.id));
    validIds.add(''); // '' represents uncategorized
    state.boardHiddenCategories.forEach(id => {
        if (!validIds.has(id)) state.boardHiddenCategories.delete(id);
    });

    const items = [];

    // Uncategorized option
    const noneChecked = !state.boardHiddenCategories.has('');
    items.push(`<label class="board-filter-item">
        <input type="checkbox" ${noneChecked ? 'checked' : ''} onchange="toggleBoardCategoryFilter('', this.checked)">
        <span style="color:var(--text-muted);font-style:italic">Uncategorized</span>
    </label>`);

    // One item per category
    state.categories.forEach(c => {
        const isChecked = !state.boardHiddenCategories.has(c.id);
        items.push(`<label class="board-filter-item">
            <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleBoardCategoryFilter('${c.id}', this.checked)">
            <span class="cat-dot-sm" style="background:${c.color}"></span>
            ${esc(c.name)}
        </label>`);
    });

    if (items.length === 1) {
        // Only uncategorized — no categories yet
        items.push(`<div style="padding:4px 8px;font-size:12px;color:var(--text-muted)">No categories yet</div>`);
    }

    dropdown.innerHTML = items.join('');
    updateBoardFilterBtnState('board-cat-filter-btn', state.boardHiddenCategories.size > 0);
}

// ── Event Handlers ────────────────────────────
function handleSearch(v) { state.search = v; render(); }
function setSort(v)       { state.sort = v; render(); }

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal('task-modal'); closeModal('time-modal'); closeModal('cat-modal'); closeModal('detail-modal'); }
    if (e.key === 'Enter' && document.getElementById('task-modal').classList.contains('visible')) {
        if (document.activeElement.tagName !== 'TEXTAREA') saveTask();
    }
    if (e.altKey && e.key === 'n') { e.preventDefault(); openAddTask(); }
});

// ── Init ──────────────────────────────────────
document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
</script>
